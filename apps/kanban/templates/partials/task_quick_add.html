<form class="quick-add" data-quick-add-form="{{ column_key }}" hidden hx-post="/board/tasks" hx-target="#board-shell" hx-swap="outerHTML">
  <input type="hidden" name="column_key" value="{{ column_key }}">
  <label>
    <span>New task</span>
    <input type="text" name="title" placeholder="Task title" required>
  </label>
  <label>
    <span>Project</span>
    <select name="project_id">
      <option value="">Select a project</option>
      {% for project in projects %}
        <option value="{{ project.id }}">{{ project.id }} — {{ project.title }} · {{ project.customer_name }}</option>
      {% endfor %}
    </select>
  </label>
  <button type="button" class="inline-toggle" data-inline-create-toggle>+ Or create customer + project</button>
  <div class="inline-create-fields" data-inline-create-fields hidden>
    <label>
      <span>Customer</span>
      <input type="text" name="new_customer_name" placeholder="New customer name">
    </label>
    <label>
      <span>Project title</span>
      <input type="text" name="new_project_title" placeholder="New project title">
    </label>
  </div>
  <label>
    <span>Notes</span>
    <textarea name="description" rows="2" placeholder="Optional context"></textarea>
  </label>
  <div class="quick-add-actions">
    <button type="submit">Add to backlog</button>
    <button type="button" class="secondary-button" data-quick-add-close="{{ column_key }}">Cancel</button>
  </div>
</form>
