<form class="quick-add" data-quick-add-form="{{ column_key }}" hidden hx-post="/board/tasks" hx-target="#board-shell" hx-swap="outerHTML">
  <input type="hidden" name="column_key" value="{{ column_key }}">
  <label>
    <span>New task</span>
    <input type="text" name="title" placeholder="Task title" required>
  </label>
  {% with origin='quick-add', target='project_id', value='', current_label='' %}
    {% include 'partials/project_picker_field.html' %}
  {% endwith %}
  <label>
    <span>Notes</span>
    <textarea name="description" rows="2" placeholder="Optional context"></textarea>
  </label>
  <div class="quick-add-actions">
    <button type="submit">Add to backlog</button>
    <button type="button" class="secondary-button" data-quick-add-close="{{ column_key }}">Cancel</button>
  </div>
</form>
