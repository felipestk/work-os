{% extends 'base.html' %}

{% block title %}Operations Board{% endblock %}

{% block content %}
<main class="page-shell">
  {% include 'partials/board_shell.html' %}

  <div class="drawer-backdrop" data-detail-backdrop hidden></div>
  <aside class="detail-drawer" data-detail-drawer aria-hidden="true">
    <section class="detail-panel" data-detail-panel>
      <div class="detail-placeholder">Select a task to inspect its details.</div>
    </section>
  </aside>

  <div class="modal-backdrop" data-project-modal-backdrop hidden></div>
  <aside class="project-modal" data-project-modal aria-hidden="true">
    <section class="project-modal-panel" data-project-modal-panel></section>
  </aside>
</main>
{% endblock %}
